<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QRGen Pro - QR Code Generator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:40px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
margin-bottom:10px;
}

input,textarea,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

#qrcode{
margin-top:30px;
}

.controls{
margin-top:20px;
}

.colorbox{
display:flex;
gap:10px;
justify-content:center;
margin-top:10px;
}

.colorbox input{
width:60px;
height:40px;
padding:0;
}

.slider{
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<h1><i class="fas fa-qrcode"></i> QR Code Generator</h1>

<select id="type">
<option value="url">URL</option>
<option value="text">Text</option>
<option value="email">Email</option>
<option value="wifi">WiFi</option>
<option value="whatsapp">WhatsApp</option>
</select>

<textarea id="content" placeholder="Enter content"></textarea>

<div class="slider">
<label>Size</label>
<input type="range" id="size" min="150" max="500" value="250">
</div>

<div class="colorbox">
<div>
<label>FG</label>
<input type="color" id="fg" value="#000000">
</div>

<div>
<label>BG</label>
<input type="color" id="bg" value="#ffffff">
</div>
</div>

<button onclick="generateQR()">Generate QR</button>

<div id="qrcode"></div>

<div class="controls">

<button onclick="downloadPNG()">Download PNG</button>

<button onclick="downloadSVG()">Download SVG</button>

<button onclick="copyQR()">Copy SVG</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<script>

let qrSVG = ""

function buildContent(){

const type=document.getElementById("type").value
const content=document.getElementById("content").value

if(type==="url") return content

if(type==="text") return content

if(type==="email") return "mailto:"+content

if(type==="whatsapp"){

const number=content.replace(/\D/g,'')

return "https://wa.me/"+number

}

if(type==="wifi"){

return "WIFI:S:"+content+";T:WPA;P:password;;"

}

}

function generateQR(){

const data=buildContent()

const size=parseInt(document.getElementById("size").value)

const fg=document.getElementById("fg").value

const bg=document.getElementById("bg").value

QRCode.toString(data,{
type:'svg',
width:size,
margin:2,
color:{
dark:fg,
light:bg
}
},function(err,svg){

if(err)return alert("QR Error")

qrSVG=svg

document.getElementById("qrcode").innerHTML=svg

})

}

function downloadSVG(){

if(!qrSVG)return alert("Generate QR first")

const blob=new Blob([qrSVG],{type:"image/svg+xml"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url

a.download="qr-code.svg"

a.click()

}

function downloadPNG(){

if(!qrSVG)return alert("Generate QR first")

const img=new Image()

const canvas=document.createElement("canvas")

const size=parseInt(document.getElementById("size").value)

canvas.width=size
canvas.height=size

const ctx=canvas.getContext("2d")

img.onload=function(){

ctx.drawImage(img,0,0,size,size)

canvas.toBlob(function(blob){

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="qr-code.png"

a.click()

})

}

img.src="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(qrSVG)))

}

async function copyQR(){

if(!qrSVG)return alert("Generate QR first")

try{

await navigator.clipboard.writeText(qrSVG)

alert("SVG Copied!")

}catch{

alert("Copy failed")

}

}

</script>

</body>
</html>
